<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #E8E4DF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 24px 16px; }
  .mc-scroll::-webkit-scrollbar { display: none; }
</style>
</helmet>

<div style="width:390px; height:844px; background:#F7F4F0; border-radius:48px; overflow:hidden; position:relative; display:flex; flex-direction:column;">

  <div style="padding:14px 24px 0; flex-shrink:0;">
    <span style="font-weight:600; font-size:15px; color:#1A1A2E;">20:14</span>
  </div>

  <!-- Header -->
  <div style="padding:12px 20px 12px; flex-shrink:0; display:flex; align-items:center; gap:10px; border-bottom:1px solid #E5E2DE; background:#fff;">
    <div onClick="{{ onBack }}" style="width:34px; height:34px; border-radius:50%; background:#F7F4F0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>

    <div style="position:relative; flex-shrink:0;">
      <div style="width:38px; height:38px; border-radius:50%; position:relative;">
        <div style="width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-weight:700; font-size:14px; color:#fff; background:#8B5CF6;">L</div>
        <div style="position:absolute; bottom:0; right:0; width:10px; height:10px; background:#22C55E; border-radius:50%; border:2px solid #fff;"></div>
      </div>
    </div>

    <div style="flex:1; min-width:0;">
      <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:14.5px; color:#1A1A2E;">Léa</div>
      <div style="font-size:11px; color:#22C55E; font-weight:500;">En ligne</div>
    </div>

    <div style="display:flex; gap:6px;">
      <div style="width:34px; height:34px; border-radius:50%; background:#F7F4F0; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div style="width:34px; height:34px; border-radius:50%; background:#F7F4F0; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </div>
    </div>
  </div>

  <!-- Event banner -->
  <div onClick="{{ onOpenEvent }}" style="margin:12px 20px 0; flex-shrink:0; background:#FFE8E7; border-radius:14px; padding:11px 13px; display:flex; align-items:center; gap:10px; cursor:pointer;">
    <span style="font-size:20px;">🎭</span>
    <div style="flex:1; min-width:0;">
      <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:12.5px; color:#1A1A2E;">Les Impromptus du Jeudi</div>
      <div style="font-size:11px; color:#B45309;">Jeu. 3 juillet · Le Ferrailleur</div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF5C57" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- Messages -->
  <div class="mc-scroll" style="flex:1; overflow-y:auto; padding:16px 20px;">

    <div style="text-align:center; margin-bottom:14px;">
      <span style="font-size:11px; color:#9A948C; background:#E5E2DE; padding:4px 12px; border-radius:10px;">Conversation créée · 21h03</span>
    </div>

    <sc-for list="{{ messages }}" as="m" hint-placeholder-count="6">
      <sc-if value="{{ m.isSystem }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center; margin:12px 0;">
          <span style="font-size:11px; color:#9A948C; background:#E5E2DE; padding:4px 12px; border-radius:10px;">{{ m.text }}</span>
        </div>
      </sc-if>
      <sc-if value="{{ m.isBanner }}" hint-placeholder-val="{{ false }}">
        <div style="background:#F1EBFE; border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:9px; margin:12px 0;">
          <span style="font-size:15px;">👋</span>
          <div style="flex:1; font-size:11.5px; color:#5B21B6;"><strong>{{ m.name }}</strong> cherche aussi quelqu'un · <span style="font-weight:600; text-decoration:underline; cursor:pointer;">Ajouter à cette conv.</span></div>
        </div>
      </sc-if>
      <sc-if value="{{ m.isChat }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex; flex-direction:column; align-items:{{ m.align }}; margin-bottom:12px;">
          <sc-if value="{{ m.showName }}" hint-placeholder-val="{{ false }}">
            <div style="font-size:10px; font-weight:700; color:#FF5C57; margin-bottom:3px; margin-left:2px;">{{ m.sender }}</div>
          </sc-if>
          <div style="{{ m.bubbleStyle }}">{{ m.text }}</div>
          <div style="{{ m.timeStyle }}">{{ m.time }}{{ m.readMark }}</div>
        </div>
      </sc-if>
    </sc-for>

  </div>

  <!-- WhatsApp share suggestion -->
  <sc-if value="{{ showWaSuggestion }}" hint-placeholder-val="{{ false }}">
    <div style="padding:0 20px 8px; flex-shrink:0;">
      <div onClick="{{ onShareWa }}" style="text-align:center; font-size:11.5px; color:#16A34A; font-weight:600; cursor:pointer;">💬 Partager le lien WhatsApp du groupe ?</div>
    </div>
  </sc-if>

  <!-- Input bar -->
  <div style="padding:10px 20px 24px; flex-shrink:0; display:flex; align-items:center; gap:10px; background:#fff; border-top:1px solid #E5E2DE;">
    <div style="width:36px; height:36px; border-radius:50%; background:#F7F4F0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </div>
    <div style="flex:1; background:#F7F4F0; border-radius:20px; padding:10px 16px;">
      <input value="{{ draft }}" onInput="{{ onDraft }}" placeholder="Écrire…" style="width:100%; border:none; outline:none; background:transparent; font-size:13.5px; color:#1A1A2E;" />
    </div>
    <div onClick="{{ onSend }}" style="width:38px; height:38px; border-radius:50%; background:#FF5C57; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.MESSAGES = [
      { from:'Léa', text:'Salut ! Tu viens toujours ce soir pour les Impromptus ?', time:'20h58' },
      { from:'me', text:'Oui carrément, hâte 🎭', time:'21h01' },
      { from:'system', text:'Romain a rejoint la conversation' },
      { from:'Léa', text:'On se retrouve directement là-bas ? 🎭', time:'21h04' },
      { from:'me', text:'J\u2019habite à 5 min d\u2019Erdre 🙌', time:'21h07', read:true },
      { from:'banner', name:'Sarah' },
    ];
    this.state = { draft:'' };
  }

  nav(file){ try { (window.parent||window).postMessage({type:'omnav', file:file}, '*'); } catch(e){} }

  renderVals(){
    const S = this.state;
    let lastSender = null;
    const messages = this.MESSAGES.map(m=>{
      if (m.from==='system') { lastSender=null; return { isSystem:true, isBanner:false, isChat:false, text:m.text }; }
      if (m.from==='banner') { lastSender=null; return { isSystem:false, isBanner:true, isChat:false, name:m.name }; }
      const mine = m.from==='me';
      const showName = !mine && lastSender!==m.from;
      lastSender = mine ? null : m.from;
      return {
        isSystem:false, isBanner:false, isChat:true,
        align: mine ? 'flex-end' : 'flex-start', showName, sender:m.from, text:m.text, time:m.time,
        readMark: mine && m.read ? '  Lu ✓✓' : '',
        bubbleStyle: 'max-width:75%; padding:10px 14px; border-radius:'+(mine?'16px 16px 4px 16px':'16px 16px 16px 4px')+'; font-size:13px; line-height:1.4; '
          + (mine ? 'background:#1A1A2E; color:#fff;' : 'background:#fff; color:#1A1A2E; border:1px solid #E5E2DE;'),
        timeStyle: 'font-size:9px; margin-top:4px; '+(mine ? 'color:rgba(26,26,46,0.4); text-align:right;' : 'color:#9A948C; margin-left:2px;'),
      };
    });

    return {
      onBack: ()=>this.nav('Messages-Liste.dc.html'),
      onOpenEvent: ()=>this.nav('uploads/buddy-design-kit/03-fiche-event.html'),
      messages,
      showWaSuggestion: true,
      onShareWa: ()=>{},
      draft: S.draft, onDraft:(e)=>this.setState({draft:e.target.value}),
      onSend: ()=>{ if (S.draft.trim()) this.setState({draft:''}); },
    };
  }
}
</script>
</body>
</html>
