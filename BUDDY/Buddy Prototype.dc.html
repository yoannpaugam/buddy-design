<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #E8E4DF; }
  .bd-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .bd-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }
  .bd-frame { width: 100%; height: 100%; border: 0; display: block; background: #E8E4DF; }
</style>
</helmet>

<div style="display:flex; height:100vh; width:100%; overflow:hidden; font-family:'Inter',sans-serif; background:#E8E4DF;">

  <!-- ============ SIDEBAR ============ -->
  <aside class="bd-scroll" style="width:300px; flex-shrink:0; background:#1A1A2E; color:#fff; display:flex; flex-direction:column; overflow-y:auto; box-shadow:2px 0 24px rgba(0,0,0,0.18); z-index:2;">

    <div style="padding:26px 24px 18px;">
      <div style="font-family:'Caprasimo',cursive; font-weight:400; font-size:28px; letter-spacing:0; color:#FF5C57; line-height:1;">Buddy</div>
      <div style="margin-top:8px; font-size:11.5px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:rgba(255,255,255,0.42);">Prototype interactif</div>
    </div>

    <div style="height:1px; background:rgba(255,255,255,0.08); margin:0 24px 14px;"></div>

    <nav style="flex:1; padding:0 14px 20px;">
      <sc-for list="{{ groups }}" as="group" hint-placeholder-count="5">
        <div style="margin-bottom:16px;">
          <div style="padding:0 10px; margin-bottom:8px; font-size:10.5px; font-weight:700; letter-spacing:0.7px; text-transform:uppercase; color:rgba(255,255,255,0.34);">{{ group.name }}</div>
          <sc-for list="{{ group.items }}" as="item" hint-placeholder-count="2">
            <div onClick="{{ item.onSelect }}" style="{{ item.style }}" style-hover="background:rgba(255,255,255,0.06);">
              <div style="display:flex; align-items:center; gap:10px;">
                <div style="{{ item.dotStyle }}"></div>
                <div style="flex:1; min-width:0;">
                  <div style="font-family:'Poppins',sans-serif; font-weight:600; font-size:13.5px; color:#fff; line-height:1.25;">{{ item.title }}</div>
                  <sc-if value="{{ showNotes }}" hint-placeholder-val="{{ true }}">
                    <div style="font-size:11px; color:rgba(255,255,255,0.45); line-height:1.4; margin-top:3px;">{{ item.desc }}</div>
                  </sc-if>
                </div>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-for>
    </nav>

    <div style="padding:14px 24px 22px; border-top:1px solid rgba(255,255,255,0.08); font-size:11px; color:rgba(255,255,255,0.4); line-height:1.5;">
      Les écrans gardent leurs interactions internes (onglets, cartes…). Utilise ← → pour naviguer.
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main style="flex:1; display:flex; flex-direction:column; min-width:0;">

    <!-- Toolbar -->
    <header style="height:70px; flex-shrink:0; background:#fff; border-bottom:1px solid #E5E2DE; display:flex; align-items:center; gap:16px; padding:0 24px;">
      <div style="flex:1; min-width:0; display:flex; align-items:center; gap:12px;">
        <span style="font-size:10.5px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#FF5C57; background:#FFE8E7; padding:5px 11px; border-radius:20px; white-space:nowrap;">{{ currentGroup }}</span>
        <div style="min-width:0;">
          <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:18px; color:#1A1A2E; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ currentTitle }}</div>
          <div style="font-size:12px; color:#6B7280; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ currentDesc }}</div>
        </div>
      </div>

      <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
        <span style="font-family:'Poppins',sans-serif; font-weight:700; font-size:13px; color:#6B7280; margin-right:4px;">{{ counter }}</span>
        <div onClick="{{ onPrev }}" style="{{ prevStyle }}" style-hover="border-color:#FF5C57;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div onClick="{{ onNext }}" style="{{ nextStyle }}" style-hover="border-color:#FF5C57;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
    </header>

    <!-- Stage -->
    <section style="flex:1; position:relative; overflow:hidden; background:#E8E4DF;">
      <iframe class="bd-frame" title="{{ currentTitle }}" src="{{ currentFile }}" key="{{ currentFile }}"></iframe>
    </section>

  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;showNotes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Affichage&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.SCREENS = [
      { file: 'Onboarding.dc.html',                                 title: 'Onboarding',           group: 'Découverte',   desc: 'Bienvenue, concept, charte, ville, goûts, profil — interactif.' },
      { file: 'Accueil.dc.html',                                    title: 'Accueil',              group: 'Découverte',   desc: 'Home style Netflix — rubriques à scroll horizontal.' },
      { file: 'Explorer.dc.html',                                   title: 'Explorer',             group: 'Découverte',   desc: 'Recherche d\'events — vue Liste / Carte.' },
      { file: 'Recherche-Filtree.dc.html',                          title: 'Recherche filtrée',    group: 'Découverte',   desc: 'Date · heure · distance · prix · catégories — interactif.' },
      { file: 'uploads/buddy-design-kit/03-fiche-event.html',       title: 'Fiche event',          group: 'Event & appel', desc: 'Hero, infos, bloc social, 3 CTA.' },
      { file: 'uploads/buddy-design-kit/04-appel-ouvert.html',      title: 'Appel ouvert',         group: 'Event & appel', desc: "Composer l'appel + réponse & chat." },
      { file: 'uploads/buddy-design-kit/05-flow-appel-complet.html',title: 'Flow appel complet',   group: 'Event & appel', desc: 'Réponses · chat groupé · après-event · Buddies.' },
      { file: 'Agenda.dc.html',                                     title: 'Agenda',               group: 'Agenda',       desc: 'À venir · Envies · Historique — seul/accompagné, vue Liste/Calendrier.' },
      { file: 'uploads/buddy-design-kit/08-onglet-buddy.html',      title: 'Onglet Buddy',         group: 'Social',       desc: 'Buddies · groupes · demandes.' },
      { file: 'uploads/buddy-design-kit/09-profil-visibilite.html', title: 'Profil & visibilité',  group: 'Profil',       desc: 'Profil public + réglages de visibilité.' },
      { file: 'Notifications.dc.html',                              title: 'Notifications',       group: 'Social',       desc: 'Centre de notifications — social, events, agenda.' },
      { file: 'Participants.dc.html',                               title: 'Participants',         group: 'Event & appel', desc: "Voir tous les participants d'un event." },
      { file: 'Creer-Groupe.dc.html',                                title: 'Créer un groupe',       group: 'Social',       desc: 'Stepper 3 étapes — nom, buddies, récap.' },
      { file: 'Rechercher-Buddy.dc.html',                            title: 'Rechercher un Buddy',   group: 'Social',       desc: 'Suggestions, croisés récemment, intérêts.' },
      { file: 'Modifier-Profil.dc.html',                             title: 'Modifier le profil',    group: 'Profil',       desc: 'Photo, nom, ville, bio, centres d\'intérêt.' },
      { file: 'Parametres.dc.html',                                  title: 'Paramètres',            group: 'Profil',       desc: 'Mode sombre, accessibilité, notifications, compte.' },
      { file: 'Groupe-Detail.dc.html',                                title: 'Détail groupe',          group: 'Social',       desc: 'Aperçu, discussion, agenda partagé du groupe.' },
      { file: 'FAQ.dc.html',                                          title: 'FAQ & aide',             group: 'Profil',       desc: 'Questions fréquentes, sécurité, signalement.' },
      { file: 'Parametres-Groupe.dc.html',                            title: 'Paramètres du groupe',   group: 'Social',       desc: 'Nom, notifications, membres, quitter/supprimer.' },
      { file: 'Messages-Liste.dc.html',                               title: 'Messages',               group: 'Messages',     desc: 'Conversations solo/groupe/event, demandes en attente.' },
      { file: 'Messages-Demandes.dc.html',                            title: 'Demandes',               group: 'Messages',     desc: 'Amis, invitations groupe, nouvelles conversations.' },
      { file: 'Messages-Buddies-Groupes.dc.html',                     title: 'Buddies & Groupes',      group: 'Messages',     desc: 'Annuaire — en ligne, mes Buddies, mes groupes.' },
      { file: 'Messages-Conversation.dc.html',                        title: 'Conversation',           group: 'Messages',     desc: 'Fil de discussion solo/groupe, bannière event.' },
    ];
    this.state = { current: 0, rawFile: null };
    this._onKey = this._onKey.bind(this);
    this._onMsg = this._onMsg.bind(this);
  }

  componentDidMount() {
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('message', this._onMsg);
  }
  componentWillUnmount() {
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('message', this._onMsg);
  }
  _onMsg(e) {
    const d = e && e.data;
    if (!d || d.type !== 'omnav' || !d.file) return;
    // match by exact file or by basename (tolerate ../ prefixes from nested screens)
    const rawNoHash = String(d.file).split('#')[0];
    const base = rawNoHash.split('/').pop();
    let i = this.SCREENS.findIndex(s => s.file === rawNoHash);
    if (i < 0) i = this.SCREENS.findIndex(s => s.file.split('/').pop() === base);
    if (i >= 0) this.setState({ current: i, rawFile: d.file });
  }
  _onKey(e) {
    if (e.key === 'ArrowRight') this.go(1);
    else if (e.key === 'ArrowLeft') this.go(-1);
  }
  go(delta) {
    this.setState({ rawFile: null });
    this.setState(s => {
      const n = Math.min(this.SCREENS.length - 1, Math.max(0, s.current + delta));
      return { current: n };
    });
  }
  select(i) { this.setState({ current: i, rawFile: null }); }

  renderVals() {
    const showNotes = this.props.showNotes !== false;
    const cur = this.state.current;
    const total = this.SCREENS.length;

    // build grouped nav preserving order
    const groups = [];
    let last = null;
    this.SCREENS.forEach((sc, i) => {
      if (!last || last.name !== sc.group) {
        last = { name: sc.group, items: [] };
        groups.push(last);
      }
      const active = i === cur;
      last.items.push({
        title: sc.title,
        desc: sc.desc,
        onSelect: () => this.select(i),
        style: 'padding:10px 10px; border-radius:12px; cursor:pointer; margin-bottom:3px; transition:background .15s; '
          + (active ? 'background:#FF5C57;' : 'background:transparent;'),
        dotStyle: 'width:7px; height:7px; border-radius:50%; flex-shrink:0; '
          + (active ? 'background:#fff;' : 'background:rgba(255,255,255,0.28);'),
      });
    });

    const btnBase = 'width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; border:1.5px solid #E5E2DE; background:#F7F4F0; ';
    const prevStyle = btnBase + (cur === 0 ? 'color:#C9C4BE; opacity:0.5; pointer-events:none;' : 'color:#1A1A2E; cursor:pointer;');
    const nextStyle = btnBase + (cur === total - 1 ? 'color:#C9C4BE; opacity:0.5; pointer-events:none;' : 'color:#1A1A2E; cursor:pointer;');

    const scr = this.SCREENS[cur];
    return {
      groups,
      showNotes,
      currentFile: this.state.rawFile || scr.file,
      currentTitle: scr.title,
      currentDesc: scr.desc,
      currentGroup: scr.group,
      counter: (cur + 1) + ' / ' + total,
      onPrev: () => this.go(-1),
      onNext: () => this.go(1),
      prevStyle,
      nextStyle,
    };
  }
}
</script>
</body>
</html>
