<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #E8E4DF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 24px 16px; }
  .mp-scroll::-webkit-scrollbar { display: none; }
</style>
</helmet>

<div style="width:390px; height:844px; background:#F7F4F0; border-radius:48px; overflow:hidden; position:relative; display:flex; flex-direction:column;">

  <div style="padding:14px 24px 0; flex-shrink:0;">
    <span style="font-weight:600; font-size:15px; color:#1A1A2E;">20:14</span>
  </div>

  <div style="padding:14px 24px 6px; flex-shrink:0; display:flex; align-items:center; gap:12px; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div onClick="{{ onBack }}" style="width:36px; height:36px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.06); flex-shrink:0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:20px; color:#1A1A2E;">Modifier le profil</div>
    </div>
    <div onClick="{{ onSave }}" style="font-size:13px; font-weight:600; color:#FF5C57; cursor:pointer;">Enregistrer</div>
  </div>

  <div class="mp-scroll" style="flex:1; overflow-y:auto; padding:16px 24px 24px;">

    <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:24px;">
      <div style="width:88px; height:88px; border-radius:50%; background:linear-gradient(135deg,#FF5C57,#FF8A7A); display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-weight:700; font-size:32px; color:#fff; position:relative;">
        C
        <div style="position:absolute; bottom:-2px; right:-2px; width:30px; height:30px; border-radius:50%; background:#E5E2DE; border:3px solid #F7F4F0; display:flex; align-items:center; justify-content:center;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </div>
      </div>
      <div style="font-size:12px; color:#6B7280; margin-top:10px;">Changer la photo</div>
    </div>

    <sc-for list="{{ fields }}" as="f" hint-placeholder-count="4">
      <div style="margin-bottom:18px;">
        <div style="font-size:12px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:8px;">{{ f.label }}</div>
        <sc-if value="{{ f.isTextarea }}" hint-placeholder-val="{{ false }}">
          <textarea onInput="{{ f.onInput }}" style="width:100%; height:80px; padding:13px 15px; border-radius:14px; border:1.5px solid #E5E2DE; background:#fff; font-family:'Inter',sans-serif; font-size:13.5px; color:#1A1A2E; resize:none;">{{ f.value }}</textarea>
        </sc-if>
        <sc-if value="{{ f.isInput }}" hint-placeholder-val="{{ true }}">
          <input value="{{ f.value }}" onInput="{{ f.onInput }}" style="width:100%; padding:13px 15px; border-radius:14px; border:1.5px solid #E5E2DE; background:#fff; font-family:'Poppins',sans-serif; font-weight:600; font-size:14.5px; color:#1A1A2E;" />
        </sc-if>
      </div>
    </sc-for>

    <div style="margin-bottom:8px;">
      <div style="font-size:12px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:10px;">Centres d'intérêt</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        <sc-for list="{{ interests }}" as="i" hint-placeholder-count="8">
          <div onClick="{{ i.onClick }}" style="{{ i.style }}">{{ i.label }}</div>
        </sc-for>
      </div>
    </div>

  </div>

  <div style="padding:14px 24px 24px; border-top:1px solid #E5E2DE; background:#F7F4F0; flex-shrink:0;">
    <div onClick="{{ onSave }}" style="width:100%; text-align:center; background:#FF5C57; color:#fff; font-family:'Poppins',sans-serif; font-weight:700; font-size:15px; padding:15px; border-radius:16px; cursor:pointer;">✓ Valider les modifications</div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.INTERESTS = ['🎭 Théâtre','🎵 Concerts','🎲 Jeux','🌿 Sorties nature','⚽ Sport','🎨 Culture','🌙 Nocturnes','🎤 Stand-up'];
    this.state = {
      name: 'Chloé Martin',
      city: 'Nantes',
      bio: 'Toujours partante pour découvrir un nouveau spot ou un concert improbable. Team impro et jeux de société.',
      selectedInterests: ['🎭 Théâtre','🎵 Concerts','🎲 Jeux'],
    };
  }

  nav(file){ try { (window.parent||window).postMessage({type:'omnav', file:file}, '*'); } catch(e){} }

  renderVals(){
    const S = this.state;
    const fields = [
      { label:'Prénom et nom', isInput:true, isTextarea:false, value:S.name, onInput:(e)=>this.setState({name:e.target.value}) },
      { label:'Ville', isInput:true, isTextarea:false, value:S.city, onInput:(e)=>this.setState({city:e.target.value}) },
      { label:'Bio', isInput:false, isTextarea:true, value:S.bio, onInput:(e)=>this.setState({bio:e.target.value}) },
    ];

    const interests = this.INTERESTS.map(label=>{
      const on = S.selectedInterests.includes(label);
      return { label, onClick:()=>{
          const sel = on ? S.selectedInterests.filter(x=>x!==label) : [...S.selectedInterests, label];
          this.setState({selectedInterests: sel});
        },
        style:'padding:9px 14px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer; '
          + (on ? 'background:#FF5C57; color:#fff;' : 'background:#fff; color:#1A1A2E; border:1.5px solid #E5E2DE;') };
    });

    return {
      onBack: ()=>this.nav('uploads/buddy-design-kit/09-profil-visibilite.html'),
      onSave: ()=>this.nav('uploads/buddy-design-kit/09-profil-visibilite.html'),
      fields, interests,
    };
  }
}
</script>
</body>
</html>
