<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #E8E4DF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 24px 16px; }
  .pt-scroll::-webkit-scrollbar { display: none; }
</style>
</helmet>

<div style="width:390px; height:844px; background:#F7F4F0; border-radius:48px; overflow:hidden; position:relative; display:flex; flex-direction:column;">

  <div style="padding:14px 24px 0; flex-shrink:0;">
    <span style="font-weight:600; font-size:15px; color:#1A1A2E;">20:14</span>
  </div>

  <div style="padding:14px 24px 0; flex-shrink:0;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
      <div onClick="{{ onBack }}" style="width:36px; height:36px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.06); flex-shrink:0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div style="min-width:0;">
        <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:19px; color:#1A1A2E;">Participants · {{ total }}</div>
        <div style="font-size:12px; color:#6B7280; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ eventName }}</div>
      </div>
    </div>

    <div style="display:flex; gap:6px; background:#E5E2DE; border-radius:14px; padding:4px; margin:14px 0 12px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
        <div onClick="{{ t.onClick }}" style="{{ t.style }}">{{ t.label }}</div>
      </sc-for>
    </div>

    <sc-if value="{{ showSort }}" hint-placeholder-val="{{ true }}">
      <div class="pt-scroll" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:12px;">
        <sc-for list="{{ sorts }}" as="s" hint-placeholder-count="3">
          <div onClick="{{ s.onClick }}" style="{{ s.style }}">{{ s.label }}</div>
        </sc-for>
      </div>
    </sc-if>
  </div>

  <div class="pt-scroll" style="flex:1; overflow-y:auto; padding:2px 24px 20px;">

    <sc-if value="{{ showPeople }}" hint-placeholder-val="{{ true }}">
      <sc-for list="{{ people }}" as="p" hint-placeholder-count="6">
        <div style="background:#fff; border-radius:16px; padding:13px; display:flex; align-items:center; gap:12px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <div style="width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-weight:600; font-size:16px; color:#fff; flex-shrink:0; background:{{ p.avatarBg }}; position:relative;">
            {{ p.initial }}
            <sc-if value="{{ p.isBuddy }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; bottom:-2px; right:-2px; width:17px; height:17px; background:#22C55E; border-radius:50%; border:2px solid #fff; display:flex; align-items:center; justify-content:center;">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
            </sc-if>
          </div>
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
              <span style="font-family:'Poppins',sans-serif; font-weight:600; font-size:14.5px; color:#1A1A2E;">{{ p.name }}</span>
              <sc-if value="{{ p.isBuddy }}" hint-placeholder-val="{{ false }}">
                <span style="font-size:9.5px; font-weight:700; color:#22C55E; background:#DCFCE7; padding:2px 7px; border-radius:6px;">Buddy</span>
              </sc-if>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px;">
              <sc-for list="{{ p.tags }}" as="t" hint-placeholder-count="2">
                <span style="{{ t.style }}">{{ t.label }}</span>
              </sc-for>
            </div>
            <div style="font-size:11px; color:#9A948C;">à {{ p.dist }} de toi</div>
          </div>
          <div onClick="{{ p.onAction }}" style="{{ p.actionStyle }}">{{ p.actionLabel }}</div>
        </div>
      </sc-for>
    </sc-if>

    <sc-if value="{{ showCalls }}" hint-placeholder-val="{{ false }}">
      <sc-for list="{{ calls }}" as="c" hint-placeholder-count="2">
        <div style="background:#fff; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <div style="width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; font-weight:600; font-size:14px; color:#fff; flex-shrink:0; background:{{ c.avatarBg }};">{{ c.initial }}</div>
            <div style="flex:1; min-width:0;">
              <div style="font-family:'Poppins',sans-serif; font-weight:600; font-size:14px; color:#1A1A2E;">{{ c.name }}</div>
              <div style="font-size:11px; color:#9A948C;">{{ c.time }}</div>
            </div>
          </div>
          <div style="font-size:13px; color:#4B5563; line-height:1.5; margin-bottom:12px; background:#F7F4F0; border-radius:12px; padding:10px 12px;">{{ c.message }}</div>
          <div onClick="{{ c.onReply }}" style="text-align:center; background:#FF5C57; color:#fff; font-family:'Poppins',sans-serif; font-weight:600; font-size:13px; padding:11px; border-radius:12px; cursor:pointer;">Répondre</div>
        </div>
      </sc-for>
    </sc-if>

  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.PEOPLE = {
      go: [
        { name:'Marc', initial:'M', avatarBg:'#FF5C57', isBuddy:true, dist:'2 km', tags:['Concerts','Impro'] },
        { name:'Léa', initial:'L', avatarBg:'#8B5CF6', isBuddy:true, dist:'1,4 km', tags:['Théâtre','Jeux de société'] },
        { name:'Sarah', initial:'S', avatarBg:'#EC4899', isBuddy:false, dist:'3,1 km', tags:['Concerts'] },
        { name:'Romain', initial:'R', avatarBg:'#F59E0B', isBuddy:false, dist:'0,6 km', tags:['Impro','Stand-up'], hasCall:true },
        { name:'Noé', initial:'N', avatarBg:'#22C55E', isBuddy:true, dist:'4,2 km', tags:['Théâtre'] },
        { name:'Antoine', initial:'A', avatarBg:'#10B981', isBuddy:false, dist:'1,9 km', tags:[] },
        { name:'Chloé', initial:'C', avatarBg:'#8B5CF6', isBuddy:false, dist:'2,7 km', tags:['Concerts','Théâtre'] },
        { name:'Hugo', initial:'H', avatarBg:'#FF5C57', isBuddy:false, dist:'5 km', tags:[] },
      ],
      envie: [
        { name:'Julie', initial:'J', avatarBg:'#EC4899', isBuddy:false, dist:'2,3 km', tags:['Impro'] },
        { name:'Paul', initial:'P', avatarBg:'#22C55E', isBuddy:true, dist:'1,1 km', tags:['Théâtre','Concerts'] },
        { name:'Ines', initial:'I', avatarBg:'#8B5CF6', isBuddy:false, dist:'3,4 km', tags:[] },
        { name:'Yanis', initial:'Y', avatarBg:'#F59E0B', isBuddy:false, dist:'0,9 km', tags:['Stand-up'] },
      ],
    };
    this.CALLS = [
      { name:'Romain', initial:'R', avatarBg:'#F59E0B', time:'Il y a 25 min', message:'"Hello ! Je suis chaud pour venir, je connais bien l\'impro, on peut se retrouver avant ?"' },
      { name:'Ines', initial:'I', avatarBg:'#8B5CF6', time:'Il y a 1h', message:'"Salut, ça te dit qu\'on y aille ensemble ? Je ne connais personne sur place"' },
    ];
    this.state = { tab:'go', sort:'distance' };
  }

  nav(file){ try { (window.parent||window).postMessage({type:'omnav', file:file}, '*'); } catch(e){} }

  tagStyle(label){
    const common = ['Concerts'].includes(label);
    return 'font-size:10px; font-weight:600; padding:3px 8px; border-radius:7px; '+(common?'background:#F1EBFE; color:#8B5CF6;':'background:#F7F4F0; color:#6B7280;');
  }

  sortPeople(list, key){
    const arr = list.slice();
    if(key==='distance') arr.sort((a,b)=> parseFloat(a.dist) - parseFloat(b.dist));
    else if(key==='goûts') arr.sort((a,b)=> b.tags.length - a.tags.length);
    return arr;
  }

  renderVals(){
    const S = this.state;
    const tabDef = [
      {id:'go', label:'J\'y vais ('+this.PEOPLE.go.length+')'},
      {id:'envie', label:'Envie ('+this.PEOPLE.envie.length+')'},
      {id:'calls', label:'Appels ('+this.CALLS.length+')'},
    ];
    const tabs = tabDef.map(t=>({ label:t.label, onClick:()=>this.setState({tab:t.id}),
      style:'flex:1; text-align:center; padding:8px 4px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; '
        + (S.tab===t.id ? 'background:#fff; color:#1A1A2E; box-shadow:0 2px 6px rgba(0,0,0,0.08);' : 'background:transparent; color:#6B7280;') }));

    const sortDef = [{id:'distance',label:'Par distance'},{id:'goûts',label:'Par goûts communs'},{id:'date',label:"Par date d'inscription"}];
    const sorts = sortDef.map(s=>({ label:s.label, onClick:()=>this.setState({sort:s.id}),
      style:'padding:7px 13px; border-radius:18px; font-size:11.5px; font-weight:600; white-space:nowrap; cursor:pointer; '
        + (S.sort===s.id ? 'background:#1A1A2E; color:#fff;' : 'background:#fff; color:#6B7280; border:1.5px solid #E5E2DE;') }));

    const showPeople = S.tab==='go' || S.tab==='envie';
    const raw = S.tab==='go' ? this.PEOPLE.go : this.PEOPLE.envie;
    const sorted = this.sortPeople(raw, S.sort);
    const people = sorted.map(p=>{
      let actionLabel, actionColor;
      if(p.isBuddy){ actionLabel='Message'; actionColor='#1A1A2E'; }
      else if(p.hasCall){ actionLabel='Rejoindre'; actionColor='#FF5C57'; }
      else { actionLabel='Profil'; actionColor='#8B5CF6'; }
      return {
        name:p.name, initial:p.initial, avatarBg:p.avatarBg, isBuddy:p.isBuddy, dist:p.dist,
        tags: p.tags.map(t=>({label:t, style:this.tagStyle(t)})),
        actionLabel, actionStyle:'padding:8px 14px; border-radius:11px; font-size:11.5px; font-weight:600; color:#fff; white-space:nowrap; cursor:pointer; background:'+actionColor+';',
        onAction:()=>this.nav('uploads/buddy-design-kit/09-profil-visibilite.html'),
      };
    });

    return {
      onBack: ()=>this.nav('uploads/buddy-design-kit/03-fiche-event.html'),
      total: (this.PEOPLE.go.length+this.PEOPLE.envie.length)+' personnes',
      eventName: 'Les Impromptus du Jeudi',
      tabs, showSort: showPeople, sorts,
      showPeople, people,
      showCalls: S.tab==='calls',
      calls: this.CALLS.map(c=>({ ...c, onReply:()=>this.nav('uploads/buddy-design-kit/04-appel-ouvert.html') })),
    };
  }
}
</script>
</body>
</html>
