<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail" data-bg-color="#1A1A2E">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#1A1A2E"/>
    <text x="100" y="112" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#FF5C57" text-anchor="middle">Buddy</text>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1A1A2E; overscroll-behavior: none; }
  .bdm-frame { width: 390px; height: 844px; border: 0; display: block; background: #F7F4F0; border-radius: 44px; }
  .bdm-scroll::-webkit-scrollbar { display: none; }
</style>
</helmet>

<div style="position:fixed; inset:0; display:flex; flex-direction:column; font-family:'Inter',sans-serif; background:#1A1A2E; overflow:hidden;">

  <!-- Top bar -->
  <header style="flex-shrink:0; height:56px; display:flex; align-items:center; gap:10px; padding:0 12px; background:#1A1A2E; border-bottom:1px solid rgba(255,255,255,0.08); z-index:30;">
    <div onClick="{{ onToggleMenu }}" style="width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </div>
    <div style="flex:1; min-width:0;">
      <div style="font-family:'Poppins',sans-serif; font-weight:700; font-size:14.5px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ currentTitle }}</div>
      <div style="font-size:10.5px; color:rgba(255,255,255,0.45);">{{ counter }}</div>
    </div>
    <div onClick="{{ onPrev }}" style="{{ prevStyle }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div onClick="{{ onNext }}" style="{{ nextStyle }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </header>

  <!-- Stage -->
  <div ref="{{ stageRef }}" style="flex:1; position:relative; overflow:hidden; display:flex; align-items:flex-start; justify-content:center; padding-top:14px;">
    <div style="width:390px; height:844px; transform:{{ scaleTransform }}; transform-origin:top center; border-radius:44px; box-shadow:0 20px 60px rgba(0,0,0,0.4); flex-shrink:0;">
      <iframe class="bdm-frame" title="{{ currentTitle }}" src="{{ currentFile }}" key="{{ currentFile }}"></iframe>
    </div>
  </div>

  <!-- Menu drawer -->
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ onToggleMenu }}" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:39;"></div>
    <div class="bdm-scroll" style="position:fixed; top:0; left:0; bottom:0; width:82%; max-width:340px; background:#1A1A2E; z-index:40; overflow-y:auto; box-shadow:4px 0 24px rgba(0,0,0,0.3);">
      <div style="padding:22px 22px 14px;">
        <div style="font-family:'Caprasimo',cursive; font-weight:400; font-size:26px; color:#FF5C57;">Buddy</div>
        <div style="margin-top:6px; font-size:10.5px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:rgba(255,255,255,0.4);">Prototype interactif</div>
      </div>
      <div style="height:1px; background:rgba(255,255,255,0.08); margin:0 22px 10px;"></div>
      <nav style="padding:0 12px 24px;">
        <sc-for list="{{ groups }}" as="group" hint-placeholder-count="5">
          <div style="margin-bottom:14px;">
            <div style="padding:0 10px; margin-bottom:6px; font-size:10px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:rgba(255,255,255,0.34);">{{ group.name }}</div>
            <sc-for list="{{ group.items }}" as="item" hint-placeholder-count="2">
              <div onClick="{{ item.onSelect }}" style="{{ item.style }}">
                <div style="{{ item.dotStyle }}"></div>
                <div style="font-family:'Poppins',sans-serif; font-weight:600; font-size:13.5px; color:#fff;">{{ item.title }}</div>
              </div>
            </sc-for>
          </div>
        </sc-for>
      </nav>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    // Finalized screens only — deprecated flows (old "Buddy" tab, replaced by Messages) excluded.
    this.SCREENS = [
      { file: 'Onboarding.dc.html',                                 title: 'Onboarding',           group: 'Découverte',   desc: 'Bienvenue, concept, charte, ville, goûts, profil.' },
      { file: 'Accueil.dc.html',                                    title: 'Accueil',              group: 'Découverte',   desc: 'Home style Netflix — rubriques à scroll horizontal.' },
      { file: 'Explorer.dc.html',                                   title: 'Explorer',             group: 'Découverte',   desc: "Recherche d'events — vue Liste / Carte." },
      { file: 'Recherche-Filtree.dc.html',                          title: 'Recherche filtrée',    group: 'Découverte',   desc: 'Date · heure · distance · prix · catégories.' },
      { file: 'uploads/buddy-design-kit/03-fiche-event.html',       title: 'Fiche event',          group: 'Event & appel', desc: 'Hero, infos, bloc social, 3 CTA.' },
      { file: 'uploads/buddy-design-kit/04-appel-ouvert.html',      title: 'Appel ouvert',         group: 'Event & appel', desc: "Composer l'appel + réponse & chat." },
      { file: 'uploads/buddy-design-kit/05-flow-appel-complet.html',title: 'Flow appel complet',   group: 'Event & appel', desc: 'Réponses · chat groupé · après-event · Buddies.' },
      { file: 'Participants.dc.html',                               title: 'Participants',         group: 'Event & appel', desc: "Voir tous les participants d'un event." },
      { file: 'Agenda.dc.html',                                     title: 'Agenda',               group: 'Agenda',       desc: 'À venir · Envies · Historique — seul/accompagné.' },
      { file: 'Messages-Liste.dc.html',                             title: 'Messages',             group: 'Messages',     desc: 'Conversations solo/groupe/event, demandes.' },
      { file: 'Messages-Demandes.dc.html',                          title: 'Demandes',             group: 'Messages',     desc: 'Amis, invitations groupe, nouvelles conversations.' },
      { file: 'Messages-Buddies-Groupes.dc.html',                   title: 'Buddies & Groupes',    group: 'Messages',     desc: 'Annuaire — en ligne, mes Buddies, mes groupes.' },
      { file: 'Messages-Conversation.dc.html',                      title: 'Conversation',         group: 'Messages',     desc: 'Fil de discussion solo, bannière event.' },
      { file: 'Groupe-Detail.dc.html',                              title: 'Détail groupe',        group: 'Messages',     desc: 'Aperçu, discussion, agenda partagé du groupe.' },
      { file: 'Creer-Groupe.dc.html',                                title: 'Créer un groupe',      group: 'Messages',     desc: 'Stepper 3 étapes — nom, buddies, récap.' },
      { file: 'Parametres-Groupe.dc.html',                          title: 'Paramètres du groupe',  group: 'Messages',     desc: 'Nom, notifications, membres, quitter/supprimer.' },
      { file: 'Rechercher-Buddy.dc.html',                           title: 'Rechercher un Buddy',   group: 'Messages',     desc: 'Suggestions, croisés récemment, intérêts.' },
      { file: 'Notifications.dc.html',                              title: 'Notifications',        group: 'Profil',       desc: 'Centre de notifications — social, events, agenda.' },
      { file: 'Modifier-Profil.dc.html',                            title: 'Modifier le profil',    group: 'Profil',       desc: 'Photo, nom, ville, bio, centres d\u2019intérêt.' },
      { file: 'uploads/buddy-design-kit/09-profil-visibilite.html', title: 'Profil & visibilité',   group: 'Profil',       desc: 'Profil public + réglages de visibilité détaillés.' },
      { file: 'Parametres.dc.html',                                 title: 'Paramètres',            group: 'Profil',       desc: 'Mode sombre, accessibilité, notifications, compte.' },
      { file: 'FAQ.dc.html',                                        title: 'FAQ & aide',            group: 'Profil',       desc: 'Questions fréquentes, sécurité, signalement.' },
    ];
    this.state = { current: 0, rawFile: null, menuOpen: false, scale: 1 };
    this._onMsg = this._onMsg.bind(this);
    this._onResize = this._onResize.bind(this);
  }

  componentDidMount() {
    window.addEventListener('message', this._onMsg);
    window.addEventListener('resize', this._onResize);
    this._onResize();
  }
  componentWillUnmount() {
    window.removeEventListener('message', this._onMsg);
    window.removeEventListener('resize', this._onResize);
  }
  _onResize() {
    const el = this.stageEl;
    const availW = (el ? el.clientWidth : window.innerWidth) - 24;
    const availH = (el ? el.clientHeight : window.innerHeight) - 20;
    const scale = Math.min(availW / 390, availH / 844, 1.15);
    this.setState({ scale: Math.max(scale, 0.3) });
  }
  _onMsg(e) {
    const d = e && e.data;
    if (!d || d.type !== 'omnav' || !d.file) return;
    const rawNoHash = String(d.file).split('#')[0];
    const base = rawNoHash.split('/').pop();
    let i = this.SCREENS.findIndex(s => s.file === rawNoHash);
    if (i < 0) i = this.SCREENS.findIndex(s => s.file.split('/').pop() === base);
    if (i >= 0) this.setState({ current: i, rawFile: d.file });
  }
  go(delta) {
    this.setState({ rawFile: null });
    this.setState(s => ({ current: Math.min(this.SCREENS.length - 1, Math.max(0, s.current + delta)) }));
  }
  select(i) { this.setState({ current: i, rawFile: null, menuOpen: false }); }

  renderVals() {
    const S = this.state;
    const cur = S.current;
    const total = this.SCREENS.length;

    const groups = [];
    let last = null;
    this.SCREENS.forEach((sc, i) => {
      if (!last || last.name !== sc.group) { last = { name: sc.group, items: [] }; groups.push(last); }
      const active = i === cur;
      last.items.push({
        title: sc.title,
        onSelect: () => this.select(i),
        style: 'display:flex; align-items:center; gap:10px; padding:11px 10px; border-radius:12px; cursor:pointer; margin-bottom:2px; '
          + (active ? 'background:#FF5C57;' : 'background:transparent;'),
        dotStyle: 'width:7px; height:7px; border-radius:50%; flex-shrink:0; ' + (active ? 'background:#fff;' : 'background:rgba(255,255,255,0.28);'),
      });
    });

    const btnBase = 'width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(255,255,255,0.08); ';
    const prevStyle = btnBase + (cur === 0 ? 'color:rgba(255,255,255,0.25); pointer-events:none;' : 'color:#fff; cursor:pointer;');
    const nextStyle = btnBase + (cur === total - 1 ? 'color:rgba(255,255,255,0.25); pointer-events:none;' : 'color:#fff; cursor:pointer;');

    const scr = this.SCREENS[cur];
    return {
      groups,
      stageRef: (el)=>{ this.stageEl = el; if (el && !this._resized) { this._resized = true; this._onResize(); } },
      currentFile: S.rawFile || scr.file,
      currentTitle: scr.title,
      counter: (cur + 1) + ' / ' + total,
      menuOpen: S.menuOpen,
      onToggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      onPrev: () => this.go(-1),
      onNext: () => this.go(1),
      prevStyle, nextStyle,
      scaleTransform: 'scale(' + S.scale + ')',
    };
  }
}
</script>
</body>
</html>
